<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>botão de piadas com FastAPI</title>

<style>
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
    background-color: #282c34;
    color: white;
}

button {
    padding: 15px 30px;
    font-size: 20px;
    cursor: pointer;
    background-color: #00b4d8;
    color: white;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    transition: 0.3s;
}

button:hover {
    background-color: #0077b6;
}

#resultado {
    margin-top: 30px;
    font-size: 24px;
    font-style: italic;
    text-align: center;
    max-width: 600px;
    padding: 20px;
    border-radius: 8px;
    background-color: rgba(255, 255, 255, 0.1);
}
</style>

</head>

<body>

<h1>🔮 O Botão de Piadas</h1>

<button id="btn-sortear">Me dê uma Piada!</button>

<p id="resultado">
Clique no botão para receber sua frase...
</p>

<script>
const botao = document.getElementById('btn-sortear');
const textoResultado = document.getElementById('resultado');

botao.addEventListener('click', async () => {

    textoResultado.innerText = "Consultando o Python...";

    try {

        const resposta = await fetch('/api/sortear');

        const dados = await resposta.json();

        textoResultado.innerText = `"${dados.frase}"`;

    } catch (erro) {

        textoResultado.innerText = "❌ Erro! O servidor FastAPI está rodando?";

    }

});
</script>

</body>
</html>
